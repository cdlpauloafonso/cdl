[[redirects]]
  from = "http://cdlpauloafonso.com/admin/*"
  to = "https://www.cdlpauloafonso.com/admin/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://cdlpauloafonso.com/admin/*"
  to = "https://www.cdlpauloafonso.com/admin/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://cdlpauloafonso.com/*"
  to = "https://www.cdlpauloafonso.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://cdlpauloafonso.com/*"
  to = "https://www.cdlpauloafonso.com/:splat"
  status = 301
  force = true

# Lista pública: o export gera `noticias.html` na raiz, mas também existe a pasta
# `out/noticias/` (rotas dinâmicas). Sem `index.html` nessa pasta, pedidos a
# `/noticias/` (barra final) podem retornar 404 no Netlify em vez da listagem.
[[redirects]]
  from = "/noticias/"
  to = "/noticias.html"
  status = 200
  force = true

# Mesmo padrão: existe `inscricao.html` e a pasta `inscricao/` (rotas dinâmicas); sem index na pasta.
[[redirects]]
  from = "/institucional/campanhas/inscricao/"
  to = "/institucional/campanhas/inscricao.html"
  status = 200
  force = true

[build]
  base = "frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  # Falso positivo: SDK Firebase em node_modules traz exemplos "AIza..." em arquivos .d.ts;
  # o scan inteligente falha o build. A var NEXT_PUBLIC_* já é chave pública do cliente.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

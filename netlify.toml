[[redirects]]
  from = "https://cdlpauloafonso.com/*"
  to = "https://www.cdlpauloafonso.com/:splat"
  status = 301
  force = true
[build]
  base = "frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  # Falso positivo: SDK Firebase em node_modules traz exemplos "AIza..." em arquivos .d.ts;
  # o scan inteligente falha o build. A var NEXT_PUBLIC_* já é chave pública do cliente.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
